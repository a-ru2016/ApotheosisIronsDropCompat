modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''
Allows mobs to drop Apotheosis affix equipment (including modded ones) and Iron's Spells 'n Spellbooks scrolls.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="apotheosis"
    type="required"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="irons_spellbooks"
    type="required"
    ordering="AFTER"
    side="BOTH"
